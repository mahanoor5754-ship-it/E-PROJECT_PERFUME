    <style>
        
.collections {
  background: #000;
 padding: 60px 5%;   /* less outer spacing */
  color: #f5e6c8;
  text-align: center;
}

.title {
  
  font-family: 'Playfair Display', serif;
  font-weight: 500;
font-size: 36px;   /* smaller heading */
  margin-bottom: 35px;
}

.grid-container {
  display: grid;
  gap: 20px;
  max-width: 900px;   /* limit total width */
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 0.8fr 1fr;
  grid-template-rows: 220px 140px;  /* smaller heights */
  gap: 15px; 
}
.grid-item {
  overflow: hidden;
  border-radius: 10px;
}

.grid-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.5s ease;
}

.grid-item img:hover {
  transform: scale(1.05);
}

/* Make left & right images tall */
.tall {
  grid-row: span 2;
}
 

    </style>
